<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Харчування для матусі</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#142A20;
    --bg-soft:#1C3A2C;
    --bg-soft-2:#234633;
    --paper:#FBF1DE;
    --paper-edge:#EEDDB8;
    --ink:#20271D;
    --ink-soft:#5C6553;
    --honey:#E3A22B;
    --honey-soft:#F2D49B;
    --paprika:#C9523F;
    --paprika-soft:#E9C2B8;
    --sage:#7E9C6B;
    --line:rgba(32,39,29,0.13);
    --line-light:rgba(251,241,222,0.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--paper);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    position:fixed;inset:0;
    display:flex;
    flex-direction:column;
    max-width:560px;
    margin:0 auto;
    background:
      radial-gradient(900px 500px at 15% -10%, var(--bg-soft-2), transparent 60%),
      var(--bg);
  }
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    opacity:1;
    transition:opacity .35s ease;
  }
  .screen.hidden{opacity:0;pointer-events:none;}
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-weight:600;
  }

  /* ---------- COVER ---------- */
  #cover{
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px 28px 40px;
    position:relative;
  }
  .leaf-art{width:128px;height:128px;margin-bottom:18px;}
  .cover-eyebrow{color:var(--sage);margin-bottom:14px;}
  .cover-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:44px;
    line-height:1.04;
    letter-spacing:-.01em;
    color:var(--paper);
    margin:0 0 14px;
  }
  .cover-title em{
    font-style:italic;
    font-weight:300;
    color:var(--honey);
  }
  .cover-sub{
    font-size:16px;
    line-height:1.5;
    color:rgba(251,241,222,.72);
    max-width:320px;
    margin:0 auto 30px;
  }
  .cover-emoji-row{
    font-size:22px;
    letter-spacing:6px;
    margin:0 0 26px;
    opacity:.85;
  }
  .cover-meta{
    display:flex;gap:18px;align-items:center;justify-content:center;
    margin-bottom:34px;
  }
  .cover-meta .dot{width:4px;height:4px;border-radius:50%;background:rgba(251,241,222,.35);}
  .cover-meta span{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;color:rgba(251,241,222,.55);}
  .btn-primary{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:17px;
    color:var(--ink);
    background:var(--honey);
    padding:16px 34px;
    border-radius:100px;
    box-shadow:0 10px 24px -8px rgba(227,162,43,.55);
    letter-spacing:.01em;
  }
  .btn-primary:active{transform:scale(.97);}
  .cover-footer{
    position:absolute;
    bottom:22px;left:0;right:0;
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.05em;
    color:rgba(251,241,222,.4);
  }

  /* ---------- CARD VIEW ---------- */
  #card-view{display:flex;}
  .topbar{
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 18px 14px;
  }
  .icon-btn{
    width:38px;height:38px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg-soft);
    color:var(--paper);
  }
  .icon-btn:active{background:var(--bg-soft-2);}
  .topbar-center{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .topbar-center .eyebrow{color:rgba(251,241,222,.5);}
  .day-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;font-weight:600;letter-spacing:.04em;
    color:var(--ink);
    background:var(--paprika-soft);
    padding:3px 10px;
    border-radius:100px;
    color:#7A2C1F;
  }

  .stage{
    flex:1 1 auto;
    position:relative;
    padding:0 16px 26px;
    overflow:hidden;
  }
  .deck{
    position:relative;
    height:100%;
    touch-action:pan-y;
  }
  .card{
    position:absolute;inset:0;
    background:var(--paper);
    border-radius:26px;
    border:1px solid var(--paper-edge);
    box-shadow:0 24px 50px -20px rgba(0,0,0,.45);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:0 22px 26px;
  }
  .card-daynum{
    font-family:'Fraunces',serif;
    font-weight:300;
    font-size:104px;
    line-height:1;
    color:var(--ink);
    opacity:.92;
    margin:-6px 0 0 -4px;
    letter-spacing:-.02em;
  }
  .card-daynum .slash{color:var(--paper-edge);font-weight:300;}
  .card-special{
    margin-top:-8px;
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:500;
    font-size:17px;
    color:var(--paprika);
  }
  .card-note{
    margin-top:10px;
    font-size:13.5px;
    color:var(--ink-soft);
    background:rgba(201,82,63,.08);
    border-left:3px solid var(--paprika);
    padding:9px 12px;
    border-radius:6px;
    line-height:1.5;
  }
  .meal{margin-top:22px;}
  .meal:first-of-type{margin-top:18px;}
  .meal-head{
    display:flex;align-items:baseline;gap:10px;
    margin-bottom:10px;
  }
  .meal-idx{
    font-size:15px;
    background:var(--honey-soft);
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
    line-height:1;
  }
  .item-icon{
    display:inline-block;
    margin-right:5px;
  }
  .meal-name{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:18px;
    color:var(--ink);
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  .meal-items{list-style:none;margin:0;padding:0;}
  .meal-items li{
    position:relative;
    padding-left:16px;
    margin-bottom:8px;
    font-size:14.5px;
    line-height:1.5;
    color:var(--ink);
  }
  .meal-items li::before{
    content:'';
    position:absolute;left:0;top:8px;
    width:6px;height:6px;border-radius:50%;
    background:var(--sage);
  }
  .qty{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    color:#8a5a16;
    background:rgba(227,162,43,.16);
    padding:0 4px;
    border-radius:4px;
    font-size:13px;
  }
  .card-divider{height:1px;background:var(--line);margin:22px 0 0;}

  /* ---------- DAY GRID OVERLAY ---------- */
  #day-sheet{
    position:absolute;inset:0;
    background:rgba(10,18,13,.6);
    backdrop-filter:blur(2px);
    display:flex;align-items:flex-end;
    z-index:20;
    transition:opacity .25s ease;
  }
  #day-sheet.hidden{opacity:0;pointer-events:none;}
  .sheet-panel{
    width:100%;
    background:var(--bg-soft);
    border-radius:26px 26px 0 0;
    padding:18px 18px 30px;
    max-height:78%;
    overflow-y:auto;
    transform:translateY(0);
    transition:transform .3s ease;
  }
  #day-sheet.hidden .sheet-panel{transform:translateY(30px);}
  .sheet-handle{
    width:36px;height:4px;border-radius:4px;
    background:rgba(251,241,222,.25);
    margin:0 auto 16px;
  }
  .sheet-title{
    font-family:'Fraunces',serif;font-weight:600;font-size:19px;
    margin:0 0 4px;color:var(--paper);
  }
  .sheet-sub{
    font-size:12.5px;color:rgba(251,241,222,.5);margin:0 0 16px;
  }
  .day-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:9px;
  }
  .day-tile{
    aspect-ratio:1;
    border-radius:12px;
    background:var(--bg-soft-2);
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;font-size:14px;
    color:rgba(251,241,222,.75);
    border:1px solid transparent;
  }
  .day-tile.active{
    background:var(--honey);color:var(--ink);
    box-shadow:0 6px 14px -4px rgba(227,162,43,.6);
  }
  .day-tile.special{border-color:var(--paprika);color:var(--paprika-soft);}
  .day-tile:active{transform:scale(.93);}
  .legend{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:rgba(251,241,222,.55);}
  .legend-dot{width:9px;height:9px;border-radius:3px;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ COVER ============ -->
  <section id="cover" class="screen">
    <svg class="leaf-art" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

      <div class="topbar-center">
        <div class="eyebrow" id="top-eyebrow">ДЕНЬ 1 / 30</div>
        <div class="day-tag" id="top-tag" style="display:none;"></div>
      </div>
      <button class="icon-btn" id="btn-grid" aria-label="Усі дні">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>

    <div class="stage">
      <div class="deck" id="deck"></div>
    </div>

  </section>

  <!-- ============ DAY GRID SHEET ============ -->
  <div id="day-sheet" class="hidden">
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Усі дні</div>
      <div class="sheet-sub">Обери день, щоб перейти одразу до нього</div>
      <div class="day-grid" id="day-grid"></div>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:var(--bg-soft-2)"></span>звичайний день</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--paprika)"></span>особливий день</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--honey)"></span>поточний</div>
      </div>
    </div>
  </div>

</div>

const TOTAL = DAYS.length;

/* ============================================================
   ЗБЕРЕЖЕННЯ ПОЗИЦІЇ
   ============================================================ */
async function loadLastDay(){
  try{
    const res = await window.storage.get('lastDay', false);
    if(res && res.value){
      const d = parseInt(res.value, 10);
      if(d>=1 && d<=TOTAL) return d;
    }
  }catch(e){ /* сховище Claude недоступне — спробуємо інший спосіб */ }
  try{
    const v = localStorage.getItem('mealplan_lastDay');
    if(v){
      const d = parseInt(v, 10);
      if(d>=1 && d<=TOTAL) return d;
    }
  }catch(e){ /* localStorage теж недоступний */ }
  return null;
}
async function saveLastDay(d){
  try{ await window.storage.set('lastDay', String(d), false); }catch(e){}
  try{ localStorage.setItem('mealplan_lastDay', String(d)); }catch(e){}
}

function findIcon(text){
  const t = text.toLowerCase().replace(/сыр(ой|ая|ое|ых)/g, '');
  for(const [key, icon] of FOOD_ICONS){
    if(t.includes(key)) return icon;
  }
  return '';
}

function splitTop(str){
  const tokens=[], seps=[];
  let depth=0, buf='';
  for(const ch of str){
    if(ch==='(') {depth++; buf+=ch;}
    else if(ch===')'){depth--; buf+=ch;}
    else if((ch==='+'||ch===',') && depth===0){ tokens.push(buf); seps.push(ch); buf=''; }
    else buf+=ch;
  }
  tokens.push(buf);
  return {tokens, seps};
}

function processToken(tok){
  tok = tok.trim();
  if(!tok) return tok;
  const m = tok.match(/^([^()]*)\(([^()]*)\)(.*)$/);
  if(m){
    const name = m[1].trim();
    const inner = m[2];
    const tail = m[3].trim();
    const icon = findIcon(name);
    const {tokens, seps} = splitTop(inner);
    const innerOut = tokens.map(processToken).reduce((acc,t,i)=> i===0? t : acc+' '+seps[i-1]+' '+t, '');
    let out = (icon? `<span class="item-icon">${icon}</span>`:'') + name + ' (' + innerOut + ')';
    if(tail) out += ' ' + tail;
    return out;
  }
  const icon = findIcon(tok);
  return (icon? `<span class="item-icon">${icon}</span>`:'') + tok;
}

function iconizeItem(text){
  const protectedText = text.replace(/(\d),(\d)/g, '$1\u0001$2');
  const {tokens, seps} = splitTop(protectedText);
  const out = tokens.map(processToken).reduce((acc,t,i)=> i===0? t : acc+' '+seps[i-1]+' '+t, '');
  return out.replace(/\u0001/g, ',');
}

function buildCard(dayObj){
  const card = document.createElement('div');
  card.className = 'card';

  let html = `<div class="card-daynum">${String(dayObj.day).padStart(2,'0')}<span class="slash"> / ${TOTAL}</span></div>`;
  if(dayObj.tag){
    html += `<div class="card-special">${dayObj.tag}</div>`;
  }
  if(dayObj.note){
    html += `<div class="card-note">${dayObj.note}</div>`;
  }
  html += `<div class="card-divider"></div>`;

  dayObj.meals.forEach((meal, i)=>{
    const mealIcon = MEAL_ICON[meal.label] || '🍴';
    html += `<div class="meal">
      <div class="meal-head">
        <span class="meal-idx">${mealIcon}</span>
        <span class="meal-name">${meal.label}</span>
      </div>
      <ul class="meal-items">
        ${meal.items.map(it=>`<li>${highlightQty(iconizeItem(it))}</li>`).join('')}
      </ul>
    </div>`;
  });

  card.innerHTML = html;
  return card;
}

function renderDeck(){
  els.deck.innerHTML = '';
  const dayObj = DAYS[current-1];
  els.deck.appendChild(buildCard(dayObj));

  els.topEyebrow.textContent = `ДЕНЬ ${current} / ${TOTAL}`;
  if(dayObj.tag){
    els.topTag.style.display = 'inline-block';
    els.topTag.textContent = dayObj.tag;
  } else {
    els.topTag.style.display = 'none';
  }

  buildDayGrid();
}

function buildDayGrid(){
  els.dayGrid.innerHTML = '';
  DAYS.forEach(d=>{
    const tile = document.createElement('button');
    tile.className = 'day-tile';
    if(d.tag) tile.classList.add('special');
    if(d.day === current) tile.classList.add('active');
    tile.textContent = d.day;
    tile.addEventListener('click', ()=>{
      goTo(d.day);
      closeSheet();
    });
    els.dayGrid.appendChild(tile);
  });
}

function goTo(day){
  if(day<1 || day>TOTAL) return;
  current = day;
  renderDeck();
  saveLastDay(current);
}

function showCover(){
  els.cover.classList.remove('hidden');
  els.cardView.classList.add('hidden');
  els.coverStart.textContent = lastKnown ? `Продовжити з дня ${lastKnown}` : 'Почати з дня 1';
}
function showCardView(day){
  current = day;
  renderDeck();
  els.cover.classList.add('hidden');
  els.cardView.classList.remove('hidden');
}

function openSheet(){ els.daySheet.classList.remove('hidden'); }
function closeSheet(){ els.daySheet.classList.add('hidden'); }

/* ---------- події ---------- */
els.btnHome.addEventListener('click', showCover);
els.btnGrid.addEventListener('click', openSheet);
els.daySheet.addEventListener('click', (e)=>{ if(e.target===els.daySheet) closeSheet(); });
els.coverStart.addEventListener('click', ()=>{
  showCardView(lastKnown || 1);
});

document.addEventListener('keydown', (e)=>{
  if(els.cardView.classList.contains('hidden')) return;
  if(e.key==='ArrowRight') goTo(current+1);
  if(e.key==='ArrowLeft') goTo(current-1);
});

/* ---------- свайп ---------- */
let touchStartX = null, touchStartY = null;
els.deck.addEventListener('touchstart', (e)=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
els.deck.addEventListener('touchend', (e)=>{
  if(touchStartX===null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) goTo(current+1); else goTo(current-1);
  }
  touchStartX = null; touchStartY = null;
}, {passive:true});

/* ---------- старт ---------- */
(async function init(){
  lastKnown = await loadLastDay();
  if(lastKnown){
    showCardView(lastKnown);
  } else {
    showCover();
  }
})();
